name: ImmortalWrt 25.12 - NanoPi R3S Build

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection'
        required: false
        default: 'false'
        type: choice
        options:
        - 'true'
        - 'false'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/config_r3s.seed
  DIY_P1_SH: smpackage/immortalwrt-all-1.sh
  DIY_P2_SH: smpackage/immortalwrt-all-2.sh
  TZ: Asia/Shanghai
  TARGET: rockchip
  SUBTARGET: armv8
  DEVICE: NanoPi-R3S

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo bash -c 'mkdir -p /mnt/openwrt && chmod 777 /mnt/openwrt'
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc gettext git libelf-dev libncurses5-dev libssl-dev meson openssh-client patch python3 python3-dev python3-pip python3-setuptools rsync unzip zlib1g-dev swig \
          libpython3-dev libudev-dev libusb-1.0-0-dev libusb-dev uuid-dev \
          python3-dev swig file wget grep sed sed python3-pyelftools perl perl-base \
          device-tree-compiler texinfo help2man gperf libtool autoconf automake autopoint pkg-config make patch \
          python3-ply python3-progressbar python3-yaml dpkg-dev qemu-utils xxd aria2
        sudo -E apt-get -qq clean
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: |
        pip3 install pyelftools pysocks unidecode kconfiglib
        echo "Dependencies installed successfully"

    - name: Clone source code
      run: |
        mkdir -p /mnt/openwrt
        cd /mnt/openwrt
        git clone -b $REPO_BRANCH --depth 1 $REPO_URL immortalwrt
        cd immortalwrt
        git log --oneline -1

    - name: Load custom feeds
      run: |
        cd /mnt/openwrt/immortalwrt
        echo "Loading custom feeds..."
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF feeds.conf.default
        chmod +x ${{ env.DIY_P1_SH }}
        ${{ env.DIY_P1_SH }}

    - name: Update feeds
      run: |
        cd /mnt/openwrt/immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        cd /mnt/openwrt/immortalwrt
        echo "Loading custom configuration..."
        chmod +x ${{ env.DIY_P2_SH }}
        ${{ env.DIY_P2_SH }}

        # Copy config file
        if [ -f "$(pwd)/${{ env.CONFIG_FILE }}" ]; then
          cp ${{ env.CONFIG_FILE }} .config
        else
          echo "Config file not found at ${{ env.CONFIG_FILE }}"
          exit 1
        fi

        make defconfig

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.4.0
      if: ${{ github.event.inputs.ssh == 'true' }}
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download dl package
      run: |
        cd /mnt/openwrt/immortalwrt
        make download -j8 2>&1 | head -c 32768
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -delete

    - name: Compile the firmware
      id: compile
      run: |
        cd /mnt/openwrt/immortalwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) V=s 2>&1 | tail -c 32768
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: !cancelled() ""
      run: |
        echo "Space usage:"
        df -h
        du -h /mnt/openwrt/immortalwrt/bin/ 2>/dev/null | head -20

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd /mnt/openwrt/immortalwrt
        rm -rf ./artifact/
        mkdir -p ./artifact
        find ./bin/targets/ -maxdepth 3 -type f -name "*sysupgrade*" -o -name "*factory*" -o -name "*combined*" | xargs -I {} cp -f {} ./artifact/ 2>/dev/null
        find ./bin/targets/ -maxdepth 1 -type f \( -name "*.buildinfo" -o -name "*.manifest" \) | xargs -I {} cp -f {} ./artifact/ 2>/dev/null

        # Collect APK packages if available
        if [ -d "./bin/packages" ]; then
          mkdir -p ./artifact/apk
          find ./bin/packages -type f -name "*.apk" | xargs -I {} cp -f {} ./artifact/apk/ 2>/dev/null || true
        fi

        cd ./artifact
        ls -Alh
        echo "ARTIFACT_PATH=$(pwd)" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: NanoPi-R3S-${{ env.TARGET }}-${{ github.run_number }}
        path: ${{ env.ARTIFACT_PATH }}
        retention-days: 5

    - name: Create Release
      id: release
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
        cd /mnt/openwrt/immortalwrt/artifact

        # Create archive
        tar czf NanoPi-R3S-ImmortalWrt-25.12-${{ github.run_number }}.tar.gz *

        # Calculate checksums
        md5sum NanoPi-R3S-ImmortalWrt-25.12-${{ github.run_number }}.tar.gz > MD5SUM
        sha256sum NanoPi-R3S-ImmortalWrt-25.12-${{ github.run_number }}.tar.gz > SHA256SUM

        ls -lh
        echo "RELEASE_TAG=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Upload Release
      uses: softprops/action-gh-release@master
      if: steps.release.outputs.status == 'success' && !cancelled()
      with:
        tag_name: NanoPi-R3S-${{ env.RELEASE_TAG }}
        files: /mnt/openwrt/immortalwrt/artifact/*
        body: |
          ImmortalWrt 25.12 for NanoPi R3S
          Build Date: ${{ env.TZ }}
          Build Number: ${{ github.run_number }}
          Commits: https://github.com/immortalwrt/immortalwrt/commits/${{ env.REPO_BRANCH }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 3
        keep_minimum_runs: 3
